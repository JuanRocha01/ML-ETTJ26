anbima_calendar:
  raw_csv_path: "data/calendars/01_raw/feriados_nacionais(Feriados).csv"  # usado sÃ³ p/ hash/auditoria
  cal_id: "BR_ANBIMA"
  min_date: "2001-01-01"
  max_date: "2099-12-31"
  pipeline_run_id: "local"

bcb_sgs:
  raw_dir: "data/01_raw/bcb/sgs"
  source: "BCB_SGS"
  series_meta:
    432:
      name: "SELIC"
      frequency: "D"
      unit: "% a.a."
    433:
      name: "IPCA"
      frequency: "M"
      unit: "%"

bcb_demab:
  raw_dir: "data/01_raw/bcb/demab/negociacoes_titulos_federais_secundario"
  source: "BCB_DEMAB"
  zip_prefix: "NegE"

b3_di1_range:
  start_month: "2020-01"
  end_month: "2022-01"

b3_price_report:
  head_bytes: 64000

b3_swap:
  raw_dir: "data/01_raw/b3/DerivativesMarket-SwapMarketRates"
  start_date: "2026-01-02"
  end_date: "2026-02-13"
  encoding: "cp1252"
  target_cod_prod: "T1PRE"

  product_specs_by_code:
    T1PRE:
      underlying: "DI x PRE"
      fixed_leg: "PRE"
      float_leg: "DI"
      calendar: "BU/252"

  product_specs_by_name:
    "SWAP DI X PRE":
      underlying: "DI x PRE"
      fixed_leg: "PRE"
      float_leg: "DI"
      calendar: "BU/252"

sgs_selic_series_id: 432
sgs_ipca_series_id: 433


duckdb_views:
  trusted:
    sql_files:
      - "sql/02_trusted/calendar.sql"
      - "sql/02_trusted/bcb_sgs.sql"
      - "sql/02_trusted/bcb_demab.sql"
      - "sql/02_trusted/b3_forwards_di1.sql"
      - "sql/02_trusted/b3_swaps_dixpre.sql"
  refined:
    sql_files:
      - "sql/03_refined/calendar.sql"
      - "sql/03_refined/bcb_sgs.sql"
      - "sql/03_refined/bcb_demab.sql"
      - "sql/03_refined/b3_forward_di1.sql"
      - "sql/03_refined/b3_swap_dixpre.sql"
